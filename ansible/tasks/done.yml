# Gated by install_done_fish variable (default: false)
- name: Install Fisher plugin manager (for done.fish)
  ansible.builtin.shell:
    cmd: fish -c "curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher install jorgebucaran/fisher"
  when: install_done_fish | default(false)
  changed_when: true

- name: Install done.fish via Fisher
  ansible.builtin.shell:
    cmd: fish -c "fisher install franciscolourenco/done"
  when: install_done_fish | default(false)
  changed_when: true
