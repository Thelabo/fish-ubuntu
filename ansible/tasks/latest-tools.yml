- name: Install eza from official upstream repository
  when: latest_tools_enabled | default(true)
  block:
    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      become: true

    - name: Add eza GPG key
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/eza-community/eza/1cff499f7c8c5b42c700a2c7afd2fb3a38e9c29a/deb.asc
        dest: /etc/apt/keyrings/gierens.asc
        mode: "0644"
        checksum: "sha256:{{ eza_apt_key_sha256 }}"
      become: true

    - name: Add eza apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/gierens.asc] https://deb.gierens.de stable main"
        state: present
        filename: gierens
      become: true

    - name: Install eza package
      ansible.builtin.apt:
        name: eza
        state: present
        update_cache: true
      become: true

- name: Add fastfetch PPA
  when: latest_tools_enabled | default(true) and install_fastfetch_from_ppa | default(false)
  ansible.builtin.apt_repository:
    repo: "ppa:zhangsongcui3371/fastfetch"
    state: present
    update_cache: true
  become: true

- name: Install fastfetch from PPA
  when: latest_tools_enabled | default(true) and install_fastfetch_from_ppa | default(false)
  ansible.builtin.apt:
    name: fastfetch
    state: present
  become: true

- name: Install pinned fastfetch from GitHub release
  when: latest_tools_enabled | default(true) and not (install_fastfetch_from_ppa | default(false))
  block:
    - name: Download fastfetch Debian package
      ansible.builtin.get_url:
        url: "{{ fastfetch_deb_url }}"
        dest: "/tmp/fastfetch_{{ fastfetch_version }}_amd64.deb"
        mode: "0644"
        checksum: "sha256:{{ fastfetch_deb_sha256 }}"

    - name: Install fastfetch Debian package
      ansible.builtin.apt:
        deb: "/tmp/fastfetch_{{ fastfetch_version }}_amd64.deb"
      become: true

- name: Install pinned bat from GitHub release
  when: latest_tools_enabled | default(true)
  block:
    - name: Download bat Debian package
      ansible.builtin.get_url:
        url: "{{ bat_deb_url }}"
        dest: "/tmp/bat_{{ bat_version }}_amd64.deb"
        mode: "0644"
        checksum: "sha256:{{ bat_deb_sha256 }}"

    - name: Install bat Debian package
      ansible.builtin.apt:
        deb: "/tmp/bat_{{ bat_version }}_amd64.deb"
      become: true

- name: Check installed ripgrep version
  when: latest_tools_enabled | default(true) and auto_install_diverged_github_debs | default(true)
  ansible.builtin.command:
    cmd: rg --version
  register: rg_version_check
  changed_when: false
  failed_when: false

- name: Calculate ripgrep version divergence and install strategy
  when: latest_tools_enabled | default(true) and auto_install_diverged_github_debs | default(true)
  ansible.builtin.set_fact:
    rg_installed_version: "{{ ((rg_version_check.stdout_lines | default([])) | first | default('ripgrep 0.0.0')).split(' ')[1] }}"

- name: Decide whether ripgrep divergence warrants GitHub .deb
  when: latest_tools_enabled | default(true) and auto_install_diverged_github_debs | default(true)
  ansible.builtin.set_fact:
    install_ripgrep_from_github: >-
      {{
        ((ripgrep_version.split('.')[0] | int) - (rg_installed_version.split('.')[0] | int) > (version_divergence_major_threshold | int))
        or
        (
          ((ripgrep_version.split('.')[0] | int) - (rg_installed_version.split('.')[0] | int) == (version_divergence_major_threshold | int))
          and
          ((ripgrep_version.split('.')[1] | int) - (rg_installed_version.split('.')[1] | int) > (version_divergence_minor_threshold | int))
        )
      }}

- name: Install pinned ripgrep from GitHub release when divergence is high
  when: latest_tools_enabled | default(true) and auto_install_diverged_github_debs | default(true) and (install_ripgrep_from_github | default(false))
  block:
    - name: Download ripgrep Debian package
      ansible.builtin.get_url:
        url: "{{ ripgrep_deb_url }}"
        dest: "/tmp/ripgrep_{{ ripgrep_version }}_amd64.deb"
        mode: "0644"
        checksum: "sha256:{{ ripgrep_deb_sha256 }}"

    - name: Install ripgrep Debian package
      ansible.builtin.apt:
        deb: "/tmp/ripgrep_{{ ripgrep_version }}_amd64.deb"
      become: true
