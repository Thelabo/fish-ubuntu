- name: Resolve fish binary path
  ansible.builtin.command: which fish
  register: fish_shell_path
  changed_when: false

- name: Set fish as default shell for current user
  when: set_fish_default_shell | default(true)
  ansible.builtin.user:
    name: "{{ ansible_facts['user_id'] }}"
    shell: "{{ fish_shell_path.stdout }}"
  become: true
