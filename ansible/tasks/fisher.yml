- name: Ensure Fisher plugin manager is installed
  when: install_done_fish | default(false) or install_fish_pure | default(true) or install_fish_autopair | default(true)
  block:
    - name: Download Fisher bootstrap script
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/jorgebucaran/fisher/{{ fisher_version }}/functions/fisher.fish"
        dest: /tmp/fisher_bootstrap.fish
        mode: "0644"
        checksum: "sha256:{{ fisher_bootstrap_sha256 }}"

    - name: Bootstrap Fisher from local script
      ansible.builtin.command:
        cmd: fish -c "source /tmp/fisher_bootstrap.fish"
        creates: "{{ ansible_facts['user_dir'] }}/.config/fish/functions/fisher.fish"
      changed_when: true

- name: Install pure prompt via Fisher
  when: install_fish_pure | default(true)
  ansible.builtin.command:
    cmd: fish -c "fisher install pure-fish/pure@{{ pure_fish_ref }}"
  changed_when: true

- name: Install autopair plugin via Fisher
  when: install_fish_autopair | default(true)
  ansible.builtin.command:
    cmd: fish -c "fisher install jorgebucaran/autopair.fish@{{ autopair_fish_ref }}"
  changed_when: true
