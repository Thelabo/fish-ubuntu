- name: Stow fish dotfiles into home
  when: stow_dotfiles | default(false)
  block:
    - name: Ensure ~/.config exists before stow
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.config"
        state: directory
        mode: "0755"

    - name: Ensure ~/.config/fish exists to avoid full-directory symlink
      ansible.builtin.file:
        path: "{{ ansible_facts['user_dir'] }}/.config/fish"
        state: directory
        mode: "0755"

    - name: Apply stow links from repository root
      ansible.builtin.command:
        cmd: "stow --dir {{ playbook_dir }}/.. --target {{ ansible_facts['user_dir'] }} --restow .config"
      changed_when: false
